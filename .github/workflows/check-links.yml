name: Check links

on:
  pull_request:
    paths: ['**/*.md', '.lycheeignore', '.github/workflows/check-links.yml']
  push:
    branches: [main]
    paths: ['**/*.md', '.lycheeignore', '.github/workflows/check-links.yml']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir ${{ github.workspace }} './**/*.md'
          fail: true
